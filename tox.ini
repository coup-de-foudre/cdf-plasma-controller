[tox]
# Targets the Python versions actually deployed on the Pis. Flake8 was
# dropped from the default run — the existing codebase has a backlog of
# pre-existing E252 style violations unrelated to test correctness, and
# fixing them is out of scope for the test harness.
envlist = py34, py35
skipsdist = True

[testenv]
deps =
    -r{toxinidir}/requirements.txt
commands =
    pytest tests/
